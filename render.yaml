services:
  # Frontend Service (React)
  - type: static
    name: mpt-frontend
    rootDir: frontend
    buildCommand: |
      npm cache clean --force
      rm -rf node_modules package-lock.json
      npm install --legacy-peer-deps
      npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://mpt-backend.onrender.com
      - key: NODE_VERSION
        value: "18"
    autoDeploy: true
