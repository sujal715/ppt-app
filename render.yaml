services:
  # Frontend Service (React)
  - type: static
    name: mpt-frontend
    rootDir: frontend
    buildCommand: |
      export SKIP_PREFLIGHT_CHECK=true
      npm install
      npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://mpt-backend.onrender.com
      - key: NODE_VERSION
        value: "16"
      - key: SKIP_PREFLIGHT_CHECK
        value: "true"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    autoDeploy: true
